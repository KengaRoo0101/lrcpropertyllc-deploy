<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">LRC suite visual placeholder</title>
  <desc id="desc">Abstract product cards connected by a safe review path.</desc>
  <defs>
